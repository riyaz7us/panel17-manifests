# ============================================================
# Node.js Application
# Generic Node.js app deployment with npm/yarn support
# ============================================================

name: nodejs
display_name: Node.js Application
description: "Generic Node.js web application"
version: "1.0"
tags: [node, javascript, api]


# ─────────────────────────────────────────
# RUNTIME
# ─────────────────────────────────────────
runtime:
  language: node
  version: ">=18"


# ─────────────────────────────────────────
# DEPLOY
# User can choose deployment method
# ─────────────────────────────────────────
deploy:
  default: upload
  upload: true
  manual: true
  git:
    source: "https://github.com/user/nodejs-app-template.git"
    branch: "main"


# ─────────────────────────────────────────
# DATABASE (optional)
# Uncomment if your app needs a database
# ------------------------------------------------------------
# database:
#   required: true
#   engines:
#     - name: mysql
#       version: ">=8.0"
#     - name: postgres
#       version: ">=13"


# ─────────────────────────────────────────
# WEBSERVER
# Proxy to Node.js application on port 3000
# ─────────────────────────────────────────
webserver:
  mode: proxy
  port: 3000


# ─────────────────────────────────────────
# PROCESS MANAGER
# Use pm2 to manage the Node.js process
# ─────────────────────────────────────────
process:
  manager: pm2
  start: "npm start"
  name: "{APP_NAME}"


# ─────────────────────────────────────────
# VARIABLES
# ─────────────────────────────────────────
variables:
  - key: NODE_ENV
    prompt: "Node environment"
    default: "production"
    required: false

  - key: PORT
    prompt: "Application port"
    default: "3000"
    required: false


# ─────────────────────────────────────────
# BUILD STEPS
# Install dependencies and build the application
# ─────────────────────────────────────────
install:
  - name: "Install dependencies"
    run: "cd {APP_PATH} && npm ci --production"

  - name: "Build application (if needed)"
    run: |
      cd {APP_PATH}
      if [ -f "package.json" ] && grep -q '"build"' package.json; then
        npm run build
      fi


# ─────────────────────────────────────────
# COMMANDS
# Common Node.js management commands
# ─────────────────────────────────────────
commands:
  install_deps:
    label: "Install dependencies"
    run: "cd {APP_PATH} && npm install"

  run_dev:
    label: "Run in development"
    run: "cd {APP_PATH} && npm run dev"

  logs:
    label: "View logs"
    run: "pm2 logs {APP_NAME}"

  restart:
    label: "Restart application"
    run: "pm2 restart {APP_NAME}"

  stop:
    label: "Stop application"
    run: "pm2 stop {APP_NAME}"

  custom_npm:
    label: "Run npm command"
    run: "cd {APP_PATH} && npm {ARGS}"
    allow_args: true


# ─────────────────────────────────────────
# UPDATE
# Pull latest changes and reinstall dependencies
# ─────────────────────────────────────────
update:
  - name: "Install dependencies"
    run: "cd {APP_PATH} && npm ci --production"

  - name: "Restart application"
    run: "pm2 restart {APP_NAME}"


# ─────────────────────────────────────────
# DELETE
# Clean up pm2 process and remove files
# ─────────────────────────────────────────
delete:
  drop_database: false              # Set to true if using database
  remove_webserver_config: true
  remove_files: true
  pre_delete: "pm2 delete {APP_NAME}"
